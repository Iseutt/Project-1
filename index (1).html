<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Village RPG</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");
    :root { --bg: #0f172a; --panel: rgba(10,10,20,0.82); --text: #f8fafc; }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; overflow: hidden;
      display: grid; place-items: center;
      background: radial-gradient(circle at 20% 20%, #1e293b, var(--bg) 65%);
      font-family: "Trebuchet MS", Arial, sans-serif; color: var(--text);
    }
    .game-wrap {
      position: relative; width: 960px; max-width: 96vw;
      max-height: 96vh; aspect-ratio: 1/1;
      border: 3px solid #334155; border-radius: 10px;
      overflow: visible; isolation: isolate;
      box-shadow: 0 15px 40px rgba(0,0,0,0.45);
    }
    canvas {
      position: relative; z-index: 1; display: block;
      width: 100%; height: 100%; image-rendering: pixelated;
      background: #111827; pointer-events: none; border-radius: 8px;
    }
    .settings-btn {
      position: absolute; top: 10px; right: 10px; z-index: 20;
      width: 40px; height: 40px; border: 1px solid #94a3b8; border-radius: 8px;
      background: rgba(15,23,42,0.86); color: #e2e8f0; font-size: 20px; cursor: pointer;
    }
    .settings-backdrop {
      position: absolute; inset: 0; display: none; z-index: 300;
      background: rgba(2,6,23,0.72); align-items: center; justify-content: center;
    }
    .settings-backdrop.open { display: flex; }
    .settings-panel {
      width: min(90%,700px); max-height: 86%; overflow: auto;
      background: rgba(15,23,42,0.96); border: 2px solid #334155;
      border-radius: 12px; padding: 20px; color: #f8fafc;
      font-family: "Press Start 2P", monospace; font-size: 11px; line-height: 1.6;
    }
    .settings-title { margin: 0 0 10px; font-size: 16px; }
    .settings-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; margin: 8px 0; }
    .kbd-chip { min-width: 150px; padding: 6px 8px; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: #cbd5e1; text-align: center; font-size: 10px; }
    .settings-panel button { border: 1px solid #64748b; border-radius: 6px; background: #1e293b; color: #f8fafc; padding: 8px 10px; font-family: inherit; font-size: 10px; cursor: pointer; }
    .warning-text { color: #fca5a5; min-height: 14px; margin-top: 8px; font-size: 10px; }
    .settings-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 14px; }
    .overlay-screen { position: absolute; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; font-family: "Press Start 2P", monospace; pointer-events: none; }
    .overlay-screen.open { display: flex; pointer-events: auto; }
    .overlay-screen.open button, .overlay-screen.open input { pointer-events: auto; position: relative; z-index: 10; }
    .landing-bg { width: 100%; height: 100%; background: radial-gradient(circle at 30% 20%, #1e3a8a, #020617 70%), repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 8px, transparent 8px, transparent 18px); position: absolute; inset: 0; pointer-events: none; }
    .landing-content { position: relative; z-index: 2; pointer-events: auto; text-align: center; width: min(92%,760px); color: #f8fafc; text-shadow: 2px 2px 0 #020617; }
    .landing-title { font-size: 20px; line-height: 1.6; margin-bottom: 28px; }
    .landing-sprites { display: flex; justify-content: center; gap: 28px; margin-bottom: 28px; }
    .landing-sprites img { width: 80px; height: 80px; image-rendering: pixelated; animation: bob 0.7s steps(2) infinite alternate; background: rgba(15,23,42,0.45); border-radius: 8px; padding: 6px; }
    @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-8px); } }
    .menu-btn { font-family: "Press Start 2P", monospace; font-size: 11px; color: #f8fafc; background: #1e293b; border: 2px solid #facc15; border-radius: 8px; padding: 12px 14px; cursor: pointer; margin: 8px; min-width: 280px; }
    .lang-toggle { position: absolute; top: 14px; right: 14px; z-index: 3; pointer-events: auto; }
    .dialog-card { position: relative; z-index: 2; width: min(92%,620px); background: rgba(15,23,42,0.95); border: 2px solid #334155; border-radius: 12px; padding: 20px; color: #f8fafc; text-align: center; font-family: "Press Start 2P", monospace; font-size: 11px; line-height: 1.7; }
    .dialog-input { width: 100%; margin: 14px 0; background: #0f172a; border: 2px solid #475569; border-radius: 8px; color: #f8fafc; padding: 10px; font-family: inherit; text-align: center; }
    /* TAB MENU — hidden by default, shown on ESC */
    .tab-menu { position: absolute; top: 0; right: -320px; width: 320px; height: 100%; z-index: 200; background: rgba(2,6,23,0.95); border-left: 2px solid #facc15; transition: right 0.2s ease; font-family: "Press Start 2P", monospace; color: #f8fafc; padding: 14px; overflow-y: auto; }
    .tab-menu.open { right: 0; }
    .tab-btn { width: 100%; margin: 6px 0; text-align: left; font-family: inherit; font-size: 10px; background: #1e293b; border: 1px solid #475569; color: #f8fafc; padding: 10px; border-radius: 8px; cursor: pointer; }
    .tab-subpanel { margin-top: 12px; background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 9px; line-height: 1.6; max-height: 45vh; overflow: auto; }
    /* ESC hint shown in game */
    .esc-hint { position: absolute; bottom: 8px; right: 8px; z-index: 15; font-family: "Press Start 2P", monospace; font-size: 7px; color: rgba(255,255,255,0.4); pointer-events: none; display: none; }
    .esc-hint.visible { display: block; }
  </style>
</head>
<body>
  <div class="game-wrap">
    <canvas id="game" width="960" height="960"></canvas>
    <button id="settingsToggle" class="settings-btn" aria-label="Open settings">⚙</button>
    <div class="esc-hint" id="escHint">ESC = Menu</div>
    <div id="settingsBackdrop" class="settings-backdrop">

        <div>Key Bindings</div>

        <div id="settingsWarning" class="warning-text"></div>
        <div class="settings-actions">
          <button id="resetBindingsBtn" type="button">Reset to defaults</button>
          <button id="closeSettingsBtn" type="button">Close</button>
        </div>
      </div>
    </div>
    <div id="landingOverlay" class="overlay-screen open">
      <div class="landing-bg"></div>
      <button id="langToggleBtn" class="menu-btn lang-toggle">FR / EN</button>
      <div class="landing-content">
        <div id="landingTitle" class="landing-title">POKÉMON BW — VILLAGE EDITION</div>
        <div class="landing-sprites">
          <img id="landingSnivy" alt="Snivy" />
          <img id="landingTepig" alt="Tepig" />
          <img id="landingOshawott" alt="Oshawott" />
        </div>
        <button id="newGameBtn" class="menu-btn">New Game</button>
        <button id="loadGameBtn" class="menu-btn">Load Game</button>
        <div id="landingMsg" style="margin-top:14px;min-height:20px;"></div>
      </div>
    </div>
    <div id="nameOverlay" class="overlay-screen">
      <div class="landing-bg"></div>
      <div class="dialog-card">
        <div id="namePrompt">What is your name?</div>
        <input id="playerNameInput" class="dialog-input" maxlength="10" />
        <button id="confirmNameBtn" class="menu-btn">OK</button>
      </div>
    </div>
    <div id="confirmOverlay" class="overlay-screen">
      <div class="landing-bg"></div>
      <div class="dialog-card">
        <div id="confirmText"></div>
        <div style="margin-top:12px;">
          <button id="confirmYesBtn" class="menu-btn">YES</button>
          <button id="confirmNoBtn" class="menu-btn">NO</button>
        </div>
      </div>
    </div>
    <div id="tabMenu" class="tab-menu">
      <button id="tabCloseBtn" class="menu-btn" style="min-width:100%;margin:0 0 10px;">✕ Fermer (ESC)</button>
      <div id="tabHeader" style="font-size:10px;line-height:1.8;margin-bottom:10px;"></div>
      <button class="tab-btn" data-tab-action="save">💾 Sauvegarde</button>
      <button class="tab-btn" data-tab-action="team">👥 Équipe</button>
      <button class="tab-btn" data-tab-action="items">🎒 Objets</button>
      <button class="tab-btn" data-tab-action="dex">📖 Pokédex</button>
      <button class="tab-btn" data-tab-action="quit">🚪 Quitter</button>
      <div id="tabSubpanel" class="tab-subpanel"></div>
    </div>
  </div>

  <script>
    // ── roundRect polyfill ──────────────────────────────────────────────────────
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
        r = Math.min(r, w/2, h/2);
        this.beginPath();
        this.moveTo(x+r,y);
        this.arcTo(x+w,y,x+w,y+h,r);
        this.arcTo(x+w,y+h,x,y+h,r);
        this.arcTo(x,y+h,x,y,r);
        this.arcTo(x,y,x+w,y,r);
        this.closePath();
      };
    }

    const TILE_SIZE = 64;
    const PLAYER_SPEED = 3;
    const MAP_WIDTH = 30; const MAP_HEIGHT = 30;
    const LAB_WIDTH = 10; const LAB_HEIGHT = 10;
    let animTime = 0;

    const Tile = { GRASS:0, PATH:1, WATER:2, WALL:3, LAB_FLOOR:4, DARK_GRASS:5, CENTER_ROOF:6, CENTER_WALL:7, CENTER_FLOOR_A:8, CENTER_FLOOR_B:9, CENTER_DESK:10 };
    const tileColors = {
      [Tile.GRASS]:"#5a9e3a", [Tile.PATH]:"#9a7b4f", [Tile.WATER]:"#2d6cdf",
      [Tile.WALL]:"#475569", [Tile.LAB_FLOOR]:"#8b5a2b", [Tile.DARK_GRASS]:"#2d6e1a",
      [Tile.CENTER_ROOF]:"#cc1f1a", [Tile.CENTER_WALL]:"#f1f5f9",
      [Tile.CENTER_FLOOR_A]:"#ffe4ef", [Tile.CENTER_FLOOR_B]:"#fff7fb", [Tile.CENTER_DESK]:"#7a4b2f"
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const camera = { x:0, y:0 };

    const SPRITE_IDS = { Snivy:495, Tepig:498, Oshawott:501, Patrat:504, Lillipup:506, Purrloin:509, Pidove:519, Blitzle:522, Venipede:543, Sewaddle:540 };
    const SPRITES = {};
    let spritesReady = false;

    // ── KEYBINDINGS — persisted to localStorage ─────────────────────────────────
    const KEYBINDINGS_KEY = "bw_village_keybindings_v1";
    const DEFAULT_KEYBINDINGS = {
      moveUp:["ArrowUp","w"], moveDown:["ArrowDown","s"],
      moveLeft:["ArrowLeft","a"], moveRight:["ArrowRight","d"],
      confirmTalk:[" ","Enter"], cancel:["Escape"], sprint:["Shift"]
    };
    let KEYBINDINGS = JSON.parse(JSON.stringify(DEFAULT_KEYBINDINGS));
    try {
      const saved = localStorage.getItem(KEYBINDINGS_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && typeof parsed === "object") KEYBINDINGS = parsed;
      }
    } catch {}
    function saveKeybindings() {
      try { localStorage.setItem(KEYBINDINGS_KEY, JSON.stringify(KEYBINDINGS)); } catch {}
    }

    const ACTION_LABELS = { moveUp:"Haut", moveDown:"Bas", moveLeft:"Gauche", moveRight:"Droite", confirmTalk:"Confirmer/Parler", cancel:"Menu (ESC)", sprint:"Sprint" };

    // DOM refs
    const settingsToggle=document.getElementById("settingsToggle");
    const settingsBackdrop=document.getElementById("settingsBackdrop");
    const bindingsList=document.getElementById("bindingsList");
    const settingsWarning=document.getElementById("settingsWarning");
    const resetBindingsBtn=document.getElementById("resetBindingsBtn");
    const closeSettingsBtn=document.getElementById("closeSettingsBtn");
    const settingsState={open:false,waitingAction:null};
    const landingOverlay=document.getElementById("landingOverlay");
    const nameOverlay=document.getElementById("nameOverlay");
    const confirmOverlay=document.getElementById("confirmOverlay");
    const tabMenu=document.getElementById("tabMenu");
    const tabSubpanel=document.getElementById("tabSubpanel");
    const tabHeader=document.getElementById("tabHeader");
    const landingTitle=document.getElementById("landingTitle");
    const newGameBtn=document.getElementById("newGameBtn");
    const loadGameBtn=document.getElementById("loadGameBtn");
    const landingMsg=document.getElementById("landingMsg");
    const langToggleBtn=document.getElementById("langToggleBtn");
    const playerNameInput=document.getElementById("playerNameInput");
    const confirmNameBtn=document.getElementById("confirmNameBtn");
    const namePrompt=document.getElementById("namePrompt");
    const confirmText=document.getElementById("confirmText");
    const confirmYesBtn=document.getElementById("confirmYesBtn");
    const confirmNoBtn=document.getElementById("confirmNoBtn");
    const tabCloseBtn=document.getElementById("tabCloseBtn");
    const landingSnivy=document.getElementById("landingSnivy");
    const landingTepig=document.getElementById("landingTepig");
    const landingOshawott=document.getElementById("landingOshawott");
    const escHint=document.getElementById("escHint");

    const SAVE_KEY="bw_village_save_v1";
    const LANG_PREF_KEY="bw_village_lang_v1";
    let LANG="fr";
    try { const lp=localStorage.getItem(LANG_PREF_KEY); if(lp==="fr"||lp==="en") LANG=lp; else localStorage.setItem(LANG_PREF_KEY,LANG); } catch {}

    const TEXT={
      en:{
        newGame:"New Game",loadGame:"Load Game",noSave:"No save file found.",overwriteSave:"A save file already exists. Overwrite it?",
        whatIsYourName:"What is your name?",saveGame:"Save",team:"Team",items:"Items",pokedex:"Pokedex",quit:"Exit Save",
        close:"Close",saved:"Game saved!",returnMenu:"Return to main menu? Progress will be saved.",yes:"YES",no:"NO",
        loadingSave:"Save loaded.",invalidSave:"Save was invalid. Starting new game.",keyBindings:"Key Bindings",
        settings:"Settings",resetDefaults:"Reset to defaults",player:"Player",playTime:"Play Time",location:"Location",
        seen:"Seen",caught:"Caught",partner:"PARTNER",language:"FR / EN",langActiveFr:"Français",langActiveEn:"English",
        confirmTalk:"Confirm/Talk",cancel:"Cancel",saveOverwriteDone:"Save overwritten.",noPokemonYet:"No Pokemon yet.",
        rivalReady:"Think you're ready? Let's battle!",rivalBattleIntro:"Rival wants to battle!",
        wildAppeared:"A wild {name} appeared!",blackedOut:"You blacked out! You were taken home.",
        pokemonCenter:"POKÉMON CENTER",nurseGreeting:"Welcome! Shall I heal your Pokémon?",
        healingStart:"We'll take your Pokémon for a few moments.",healingDone:"Your Pokémon are fully healed!",
        nurseNo:"Come back anytime!",darkGrassWarning:"The grass is rustling...",levelUpLine:"{name} reached level {lvl}!",
        enemyFainted:"The opposing {name} fainted!",noMorePP:"{name} has no PP left!",
        yourHouse:"Your House",professorLab:"Professor Lab",rivalHouse:"Rival House",door:"Door",
        professorLabTitle:"Professor's Lab",chooseStarter:"These are your choices - Snivy, Tepig, and Oshawott. Choose wisely!",
        choseWell:"You chose well! {name} will be a great partner.",received:"{player} received {name}!",
        starterPrompt:"This is {name}, a {type}-type Pokemon. Do you choose this one?",
        rivalBattleWin:"You got lucky this time...",critHit:"A critical hit!",superEffective:"It's super effective!",
        notVeryEffective:"It's not very effective...",defFell:"{name}'s Defense fell!",gettingPumped:"{name} is getting pumped!",
        sharpenedAim:"{name} sharpened its aim!",boundTurns:"{name} was bound for {turns} turns!",
        hurtByBinding:"{name} is hurt by binding ({dmg})!",usedMove:"{attacker} used {move}! {dmg} damage!",
        usedMoveNoDmg:"{attacker} used {move}!",noMoreFight:"You have no Pokemon left to fight...",
        villageProfessorIdle:"Welcome! Come inside when you're ready for your first partner!",
        rivalIdle:"You again? I'm going to be the best trainer!",professorLabel:"Professor",pokeballLabel:"Pokéball",
        dialogContinue:"[Space/Enter] Continue",loadingSprites:"Loading sprites...",xpGainMsg:"+{amount} XP !"
      },
      fr:{
        newGame:"Nouvelle Partie",loadGame:"Charger une Partie",noSave:"Aucune sauvegarde trouvée.",
        overwriteSave:"Une sauvegarde existe déjà. Écraser ?",whatIsYourName:"Quel est ton nom ?",
        saveGame:"Sauvegarde",team:"Équipe",items:"Objets",pokedex:"Pokédex",quit:"Quitter",close:"Fermer",
        saved:"Partie sauvegardée !",returnMenu:"Retourner au menu ? La progression sera sauvegardée.",
        yes:"OUI",no:"NON",loadingSave:"Sauvegarde chargée.",invalidSave:"Sauvegarde invalide. Nouvelle partie.",
        keyBindings:"Touches",settings:"Paramètres",resetDefaults:"Réinitialiser",player:"Joueur",
        playTime:"Temps",location:"Lieu",seen:"Vus",caught:"Capturés",partner:"PARTENAIRE",
        language:"FR / EN",langActiveFr:"Français",langActiveEn:"Anglais",confirmTalk:"Valider/Parler",cancel:"Annuler",
        saveOverwriteDone:"Sauvegarde écrasée.",noPokemonYet:"Pas encore de Pokémon.",
        rivalReady:"Prêt ? On va se battre !",rivalBattleIntro:"Rival veut se battre !",
        wildAppeared:"Un {name} sauvage apparaît !",blackedOut:"Tu as perdu connaissance ! Retour à la maison.",
        pokemonCenter:"CENTRE POKÉMON",nurseGreeting:"Bienvenue ! Soigner vos Pokémon ?",
        healingStart:"Nous allons soigner vos Pokémon un instant.",healingDone:"Vos Pokémon sont soignés ! Bonne journée !",
        nurseNo:"Revenez quand vous voulez !",darkGrassWarning:"L'herbe frémit...",levelUpLine:"{name} est passé niveau {lvl} !",
        enemyFainted:"{name} ennemi est KO !",noMorePP:"{name} n'a plus de PP !",
        yourHouse:"Ta Maison",professorLab:"Labo du Professeur",rivalHouse:"Maison du Rival",door:"Porte",
        professorLabTitle:"Labo du Professeur",chooseStarter:"Voici tes choix - Vipélierre, Gruikui et Moustillon. Choisis bien !",
        choseWell:"Bon choix ! {name} sera un excellent partenaire.",received:"{player} a reçu {name} !",
        starterPrompt:"C'est {name}, un Pokémon de type {type}. Tu le choisis ?",
        rivalBattleWin:"T'as eu de la chance cette fois...",critHit:"Coup critique !",superEffective:"C'est super efficace !",
        notVeryEffective:"Ce n'est pas très efficace...",defFell:"La Défense de {name} a baissé !",
        gettingPumped:"{name} se concentre !",sharpenedAim:"{name} a amélioré sa précision !",
        boundTurns:"{name} est enchaîné pour {turns} tours !",hurtByBinding:"{name} est blessé ({dmg}) !",
        usedMove:"{attacker} utilise {move} ! {dmg} dégâts !",usedMoveNoDmg:"{attacker} utilise {move} !",
        noMoreFight:"Tu n'as plus de Pokémon en état de combattre...",
        villageProfessorIdle:"Bienvenue ! Entre quand tu es prêt pour ton premier partenaire !",
        rivalIdle:"Encore toi ? Je serai le meilleur dresseur !",professorLabel:"Professeur",pokeballLabel:"Pokéball",
        dialogContinue:"[Espace/Entrée] Continuer",loadingSprites:"Chargement des sprites...",xpGainMsg:"+{amount} XP !"
      }
    };
    function t(k){return TEXT[LANG][k]||TEXT.en[k]||k;}
    function persistLang(){try{localStorage.setItem(LANG_PREF_KEY,LANG);}catch{}}

    const POKEMON_FR_NAMES={Snivy:"Vipélierre",Tepig:"Gruikui",Oshawott:"Moustillon",Patrat:"Ratentif",Lillipup:"Ponchiot",Purrloin:"Chafouine",Pidove:"Poichigeon",Blitzle:"Zébibron",Venipede:"Venipède",Sewaddle:"Larveyette"};
    function displayName(s){return LANG==="fr"?(POKEMON_FR_NAMES[s]||s):s;}
    function moveDisplayName(m){return LANG==="fr"&&m.nameFr?m.nameFr:m.name;}
    function moveDesc(m){return LANG==="fr"&&m.descFr?m.descFr:m.desc;}
    function moveIdOf(m){if(m.moveId)return m.moveId;return Object.keys(moveLibrary).find(k=>moveLibrary[k].name===m.name)||"";}
    function formatPlayTime(s){s=Math.max(0,s|0);return String(Math.floor(s/3600)).padStart(2,"0")+":"+String(Math.floor((s%3600)/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

    function loadImage(url){return new Promise(res=>{const i=new Image();i.onload=()=>res({ok:true,img:i});i.onerror=()=>res({ok:false,img:null});i.src=url;});}
    async function preloadSprites(){
      await Promise.all(Object.entries(SPRITE_IDS).map(async([name,id])=>{
        const [front,back]=await Promise.all([loadImage(`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`),loadImage(`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${id}.png`)]);
        SPRITES[name]={front:front.ok?front.img:null,back:back.ok?back.img:null};
      }));
      spritesReady=true;
      if(SPRITES.Snivy?.front)landingSnivy.src=SPRITES.Snivy.front.src;
      if(SPRITES.Tepig?.front)landingTepig.src=SPRITES.Tepig.front.src;
      if(SPRITES.Oshawott?.front)landingOshawott.src=SPRITES.Oshawott.front.src;
      const frames={Snivy:[`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${SPRITE_IDS.Snivy}.png`,`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${SPRITE_IDS.Snivy}.png`],Tepig:[`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${SPRITE_IDS.Tepig}.png`,`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${SPRITE_IDS.Tepig}.png`],Oshawott:[`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${SPRITE_IDS.Oshawott}.png`,`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${SPRITE_IDS.Oshawott}.png`]};
      let frame=0;setInterval(()=>{frame=(frame+1)%2;landingSnivy.src=frames.Snivy[frame];landingTepig.src=frames.Tepig[frame];landingOshawott.src=frames.Oshawott[frame];},450);
    }
    preloadSprites();

    // ── MAP ─────────────────────────────────────────────────────────────────────
    const map=Array.from({length:MAP_HEIGHT},()=>Array(MAP_WIDTH).fill(Tile.GRASS));
    function fillRectOnMap(x,y,w,h,type){for(let r=y;r<y+h;r++)for(let c=x;c<x+w;c++)if(r>=0&&r<MAP_HEIGHT&&c>=0&&c<MAP_WIDTH)map[r][c]=type;}
    fillRectOnMap(1,1,5,3,Tile.WATER);
    const playerHouse={x:2,y:21,w:6,h:6,door:{x:5,y:21}};
    const lab={x:12,y:5,w:7,h:7,door:{x:15,y:12}};
    const rivalHouse={x:22,y:21,w:6,h:6,door:{x:24,y:21}};
    const pokemonCenter={x:3,y:6,w:4,h:3,door:{x:5,y:8},sign:{x:5,y:9}};
    [playerHouse,lab,rivalHouse].forEach(b=>{fillRectOnMap(b.x,b.y,b.w,b.h,Tile.WALL);map[b.door.y][b.door.x]=Tile.PATH;});

    function worldToScreen(x,y){return{x:x-camera.x,y:y-camera.y};}

    // ── 2.5D TILE RENDERING ──────────────────────────────────────────────────────
    function drawTileGrid(grid,width,height,offsetX=0,offsetY=0){
      for(let y=0;y<height;y++){
        for(let x=0;x<width;x++){
          const tileType=grid[y][x];
          const px=(x+offsetX)*TILE_SIZE, py=(y+offsetY)*TILE_SIZE;
          const sx=px-camera.x, sy=py-camera.y;
          if(sx+TILE_SIZE<0||sy+TILE_SIZE<0||sx>canvas.width||sy>canvas.height)continue;

          // ── GRASS ──
          if(tileType===Tile.GRASS){
            ctx.fillStyle=tileColors[Tile.GRASS];
            ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // subtle variation using position as deterministic seed
            const v=((x*7+y*13)%5)*0.013;
            if(v>0.02){ctx.fillStyle=`rgba(0,0,0,${v})`;ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);}
            // grass texture lines
            ctx.strokeStyle="rgba(0,0,0,0.06)";ctx.lineWidth=1;
            for(let i=0;i<3;i++){const ox=(x*17+y*11+i*7)%TILE_SIZE;ctx.beginPath();ctx.moveTo(sx+ox,sy+TILE_SIZE*0.3);ctx.lineTo(sx+ox,sy+TILE_SIZE*0.7);ctx.stroke();}
          }
          // ── DARK GRASS ──
          else if(tileType===Tile.DARK_GRASS){
            ctx.fillStyle=tileColors[Tile.DARK_GRASS];
            ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // extra darkening towards edges (subtle vignette per tile)
            const grd=ctx.createRadialGradient(sx+TILE_SIZE/2,sy+TILE_SIZE/2,4,sx+TILE_SIZE/2,sy+TILE_SIZE/2,TILE_SIZE*0.8);
            grd.addColorStop(0,"rgba(0,0,0,0)");grd.addColorStop(1,"rgba(0,0,0,0.2)");
            ctx.fillStyle=grd;ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // triangular grass blades
            const blades=[{bx:sx+10,by:sy+TILE_SIZE-8},{bx:sx+22,by:sy+TILE_SIZE-6},{bx:sx+36,by:sy+TILE_SIZE-10},{bx:sx+48,by:sy+TILE_SIZE-6},{bx:sx+56,by:sy+TILE_SIZE-8}];
            blades.forEach(({bx,by})=>{
              ctx.fillStyle="#1a4d0f";ctx.beginPath();ctx.moveTo(bx-3,by);ctx.lineTo(bx,by-14);ctx.lineTo(bx+3,by);ctx.closePath();ctx.fill();
              ctx.fillStyle="#2d6e1a";ctx.beginPath();ctx.moveTo(bx-1,by);ctx.lineTo(bx,by-10);ctx.lineTo(bx+1,by);ctx.closePath();ctx.fill();
            });
          }
          // ── WATER ──
          else if(tileType===Tile.WATER){
            ctx.fillStyle="#1e56c0";ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            const wg=ctx.createLinearGradient(sx,sy,sx+TILE_SIZE,sy+TILE_SIZE);
            wg.addColorStop(0,"rgba(100,160,255,0.35)");wg.addColorStop(1,"rgba(10,50,150,0.35)");
            ctx.fillStyle=wg;ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // shimmer
            const so=(animTime*0.6+x*0.4+y*0.3)%1;
            ctx.fillStyle="rgba(255,255,255,0.13)";ctx.fillRect(sx,sy+so*TILE_SIZE,TILE_SIZE,4);
            ctx.fillStyle="rgba(255,255,255,0.07)";ctx.fillRect(sx,sy+((so+0.5)%1)*TILE_SIZE,TILE_SIZE,2);
            ctx.fillStyle="rgba(0,0,40,0.18)";ctx.fillRect(sx,sy,TILE_SIZE,4);ctx.fillRect(sx,sy+TILE_SIZE-4,TILE_SIZE,4);
          }
          // ── PATH ──
          else if(tileType===Tile.PATH){
            ctx.fillStyle=tileColors[Tile.PATH];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // recessed inner edge
            ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=3;ctx.strokeRect(sx+1.5,sy+1.5,TILE_SIZE-3,TILE_SIZE-3);
            // dirt texture dots
            ctx.fillStyle="rgba(0,0,0,0.07)";
            for(let i=0;i<4;i++){const dx=(x*23+y*17+i*11)%50+4;const dy=(x*19+y*29+i*7)%50+4;ctx.beginPath();ctx.arc(sx+dx,sy+dy,1.5,0,Math.PI*2);ctx.fill();}
          }
          // ── WALL / BUILDINGS ──
          else if(tileType===Tile.WALL||tileType===Tile.CENTER_ROOF||tileType===Tile.CENTER_WALL){
            // base color
            ctx.fillStyle=tileColors[tileType];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // lit top edge
            ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(sx,sy,TILE_SIZE,10);
            // shadow bottom edge (fake 3D floor)
            ctx.fillStyle="rgba(0,0,0,0.35)";ctx.fillRect(sx,sy+TILE_SIZE-12,TILE_SIZE,12);
            // left-side light strip
            ctx.fillStyle="rgba(255,255,255,0.10)";ctx.fillRect(sx,sy,8,TILE_SIZE);
            // right-side shadow strip
            ctx.fillStyle="rgba(0,0,0,0.20)";ctx.fillRect(sx+TILE_SIZE-8,sy,8,TILE_SIZE);
            // brick/panel lines for walls
            if(tileType===Tile.WALL||tileType===Tile.CENTER_WALL){
              ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1;
              ctx.beginPath();ctx.moveTo(sx,sy+TILE_SIZE/2);ctx.lineTo(sx+TILE_SIZE,sy+TILE_SIZE/2);ctx.stroke();
              ctx.beginPath();ctx.moveTo(sx+TILE_SIZE/2,sy);ctx.lineTo(sx+TILE_SIZE/2,sy+TILE_SIZE);ctx.stroke();
            }
          }
          // ── LAB FLOOR ──
          else if(tileType===Tile.LAB_FLOOR){
            ctx.fillStyle=tileColors[Tile.LAB_FLOOR];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1;ctx.strokeRect(sx+4,sy+4,TILE_SIZE-8,TILE_SIZE-8);
          }
          // ── CENTER FLOORS ──
          else if(tileType===Tile.CENTER_FLOOR_A||tileType===Tile.CENTER_FLOOR_B){
            ctx.fillStyle=tileColors[tileType];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            ctx.strokeStyle="rgba(200,100,150,0.15)";ctx.lineWidth=1;ctx.strokeRect(sx+3,sy+3,TILE_SIZE-6,TILE_SIZE-6);
          }
          // ── DESK ──
          else if(tileType===Tile.CENTER_DESK){
            ctx.fillStyle=tileColors[Tile.CENTER_DESK];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            ctx.fillStyle="rgba(255,255,255,0.12)";ctx.fillRect(sx,sy,TILE_SIZE,8);
            ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(sx,sy+TILE_SIZE-10,TILE_SIZE,10);
          }
          else{ctx.fillStyle=tileColors[tileType]||"#333";ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);}

          // grid line (subtle)
          ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=1;ctx.strokeRect(sx,sy,TILE_SIZE,TILE_SIZE);
        }
      }
    }
    function drawMap(){drawTileGrid(map,MAP_WIDTH,MAP_HEIGHT);}

    // ── BUILDING ROOFTOP 2.5D ────────────────────────────────────────────────────
    function drawBuildingRoof(tx,ty,tw,color){
      const s=worldToScreen(tileToPixel(tx),tileToPixel(ty));
      const w=tw*TILE_SIZE, roofH=TILE_SIZE*0.55;
      ctx.fillStyle=color;
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+w*0.5,s.y-roofH);ctx.lineTo(s.x+w,s.y);ctx.closePath();ctx.fill();
      // shadow right slope
      ctx.fillStyle="rgba(0,0,0,0.22)";
      ctx.beginPath();ctx.moveTo(s.x+w*0.5,s.y-roofH);ctx.lineTo(s.x+w,s.y);ctx.lineTo(s.x+w,s.y-4);ctx.closePath();ctx.fill();
      // highlight left slope
      ctx.fillStyle="rgba(255,255,255,0.14)";
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+w*0.5,s.y-roofH);ctx.lineTo(s.x+w*0.5+2,s.y-roofH+4);ctx.lineTo(s.x+6,s.y);ctx.closePath();ctx.fill();
      // chimney
      const cx=s.x+w*0.3;
      ctx.fillStyle=darken(color,30);ctx.fillRect(cx,s.y-roofH*0.5-14,12,14);
      ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(cx,s.y-roofH*0.5-14,12,4);
    }

    function isInsideMap(x,y){if(gameState.scene==="village")return x>=0&&x<MAP_WIDTH&&y>=0&&y<MAP_HEIGHT;if(gameState.scene==="lab"||gameState.scene==="center")return x>=0&&x<LAB_WIDTH&&y>=0&&y<LAB_HEIGHT;return false;}
    function isNpcOnTile(x,y){const npcs=gameState.scene==="village"?[villageProfessor,rival]:gameState.scene==="lab"?[labProfessor]:[nurse];return npcs.some(npc=>{const tp=getTilePos(npc);return tp.x===x&&tp.y===y;});}
    function canWalkTo(x,y){
      if(!isInsideMap(x,y))return false;
      const cm=gameState.scene==="village"?map:gameState.scene==="lab"?labMap:centerMap;
      const allowed=gameState.scene==="village"?walkableTiles:gameState.scene==="lab"?labWalkableTiles:centerWalkableTiles;
      if(!allowed.has(cm[y][x]))return false;
      if(isNpcOnTile(x,y))return false;
      return true;
    }
    function maybeTriggerWildBattle(){
      if(gameState.scene!=="village"||!gameState.playerPokemonState)return;
      if(tabState.open||gameState.dialogueOpen)return;
      const p=getTilePos(player);
      if(p.x===gameState.lastGrassCheck.x&&p.y===gameState.lastGrassCheck.y)return;
      gameState.lastGrassCheck={x:p.x,y:p.y};
      const onDark=map[p.y][p.x]===Tile.DARK_GRASS;
      if(onDark&&!gameState.wasInDarkGrass)gameState.darkGrassHintTimer=1500;
      gameState.wasInDarkGrass=onDark;
      if(!onDark)return;
      if(Math.random()>0.1)return;
      const pool=["Patrat","Lillipup","Purrloin","Pidove","Blitzle","Venipede","Sewaddle"];
      const species=pool[Math.floor(Math.random()*pool.length)];
      const level=2+Math.floor(Math.random()*4);
      startBattle({mode:"wild",enemySpecies:species,enemyLevel:level,intro:t("wildAppeared").replace("{name}",displayName(species))});
    }
    function syncMovementTileFromPlayer(){const tp=getTilePos(player);movementState.currentTileX=tp.x;movementState.currentTileY=tp.y;}
    function startMoveInDirection(direction){
      const v=dirToVec[direction];if(!v)return false;
      player.direction=v.dir;syncMovementTileFromPlayer();
      const tx=movementState.currentTileX+v.dx, ty=movementState.currentTileY+v.dy;
      if(!canWalkTo(tx,ty))return false;
      movementState.moving=true;movementState.dir=direction;movementState.remainingPx=TILE_SIZE;return true;
    }
    function updatePlayerMovement(dt){
      if(settingsState.open||tabState.open||gameState.mode!=="playing")return;
      if(gameState.scene==="battle"||gameState.dialogueOpen||gameState.choiceMenuOpen)return;
      if(movementState.moving){
        const isSprinting=inputState.heldSprint&&!gameState.dialogueOpen&&!gameState.choiceMenuOpen;
        const speed=isSprinting?PLAYER_SPEED*2.5:PLAYER_SPEED;
        const step=Math.min(movementState.remainingPx,speed*(dt/16.6667));
        const v=dirToVec[movementState.dir];
        player.x+=v.dx*step;player.y+=v.dy*step;movementState.remainingPx-=step;
        if(movementState.remainingPx<=0.001){
          movementState.moving=false;setEntityTile(player,movementState.currentTileX+v.dx,movementState.currentTileY+v.dy);syncMovementTileFromPlayer();
          if(gameState.scene==="lab"&&movementState.currentTileX===labDoor.x&&movementState.currentTileY===labDoor.y){returnToVillage();return;}
          if(gameState.scene==="center"&&movementState.currentTileX===centerDoor.x&&movementState.currentTileY===centerDoor.y){returnToVillageFromCenter();return;}
          if(gameState.scene==="village"&&movementState.currentTileX===pokemonCenter.door.x&&movementState.currentTileY===pokemonCenter.door.y){enterCenter();return;}
          maybeTriggerWildBattle();
          if(inputState.activeDir)startMoveInDirection(inputState.activeDir);
        }
      }else if(inputState.activeDir)startMoveInDirection(inputState.activeDir);
    }

    function getAdjacentStarterBall(){if(gameState.scene!=="lab"||gameState.starterLocked)return null;const p=getTilePos(player);return starters.find(s=>!s.taken&&Math.abs(s.x-p.x)+Math.abs(s.y-p.y)===1);}

    function rivalCounterStarter(n){if(n==="Snivy")return"Tepig";if(n==="Tepig")return"Oshawott";return"Snivy";}

    function createBattlePokemon(species,level,currentHpOverride=null){
      const d=pokemonDex[species];const maxHp=d.hp+level*2;
      return{name:species,type:d.type,level,maxHp,hp:currentHpOverride==null?maxHp:Math.max(0,Math.min(maxHp,currentHpOverride)),displayHp:currentHpOverride==null?maxHp:Math.max(0,Math.min(maxHp,currentHpOverride)),attack:d.atk+level,defense:d.def+level,defenseDown:0,focusEnergy:false,boundTurns:0,moves:d.moves.map(id=>({...moveLibrary[id],moveId:id,currentPP:moveLibrary[id].pp})),color:d.color};

    function startBattle({mode,enemySpecies,enemyLevel,intro,afterWinText=null}){

    function getTypeMultiplier(mt,dt){const row=typeChart[mt];if(!row)return 1;if(row.strong.includes(dt))return 2;if(row.weak.includes(dt))return 0.5;return 1;}
    function hpBarColor(cur,max){const p=max===0?0:cur/max;if(p>0.5)return"#22c55e";if(p>0.25)return"#facc15";return"#ef4444";}
    function updateHpDisplay(mon,dt){if(!mon)return;const speed=(mon.maxHp/500)*dt;if(Math.abs(mon.displayHp-mon.hp)<speed)mon.displayHp=mon.hp;else if(mon.displayHp>mon.hp)mon.displayHp-=speed;else mon.displayHp+=speed;}

    function applyMove(attacker,defender,move){
      const texts=[],effects=[];
      if(move.currentPP<=0)return{texts:[t("noMorePP").replace("{name}",moveDisplayName(move))],damage:0};
      move.currentPP-=1;
      let damage=0,multiplier=1,crit=false;const critChance=attacker.focusEnergy?0.24:0.06;const mid=moveIdOf(move);
      if(move.power>0){const atk=attacker.attack;const def=Math.max(1,defender.defense*Math.pow(0.85,defender.defenseDown));damage=((move.power*atk/def)/5)+2;multiplier=getTypeMultiplier(move.type,defender.type);const v=0.9+Math.random()*0.2;crit=Math.random()<critChance;if(crit)damage*=1.5;damage*=multiplier*v;damage=Math.max(1,Math.round(damage));}
      if(mid==="leer"||mid==="tailWhip"){defender.defenseDown=Math.min(6,defender.defenseDown+1);texts.push(t("defFell").replace("{name}",displayName(defender.name)));}
      if(mid==="focusEnergy"){attacker.focusEnergy=true;texts.push(t("gettingPumped").replace("{name}",displayName(attacker.name)));}
      if(mid==="odorSleuth")texts.push(t("sharpenedAim").replace("{name}",displayName(attacker.name)));
      if(mid==="wrap"&&damage>0){const turns=2+Math.floor(Math.random()*4);defender.boundTurns=turns;texts.push(t("boundTurns").replace("{name}",displayName(defender.name)).replace("{turns}",String(turns)));}
      if(damage>0){defender.hp=Math.max(0,defender.hp-damage);effects.push(t("usedMove").replace("{attacker}",displayName(attacker.name)).replace("{move}",moveDisplayName(move)).replace("{dmg}",String(damage)));if(crit)texts.push(t("critHit"));if(multiplier>1)texts.push(t("superEffective"));if(multiplier<1)texts.push(t("notVeryEffective"));}
      else if(!texts.length)effects.push(t("usedMoveNoDmg").replace("{attacker}",displayName(attacker.name)).replace("{move}",moveDisplayName(move)));
      return{damage,texts,leadText:effects[0]||t("usedMoveNoDmg").replace("{attacker}",displayName(attacker.name)).replace("{move}",moveDisplayName(move))};
    }
    function applyBoundTick(mon){if(mon.boundTurns<=0||mon.hp<=0)return null;mon.boundTurns-=1;const dmg=Math.max(1,Math.floor(mon.maxHp/8));mon.hp=Math.max(0,mon.hp-dmg);return t("hurtByBinding").replace("{name}",displayName(mon.name)).replace("{dmg}",String(dmg));}
    function resolveBattleEnd(){
      const pm=battleState.playerMon,em=battleState.enemyMon;
      if(em.hp<=0){battleState.phase="ending";battleState.timer=1500;battleState.messageText=t("enemyFainted").replace("{name}",displayName(em.name));gameState.playerPokemonState.currentHp=Math.max(1,Math.round(pm.hp));gameState.playerPokemonState.moves=pm.moves.map(m=>({...m}));return;}
      if(pm.hp<=0){battleState.phase="endingLose";battleState.timer=1500;battleState.messageText=t("noMoreFight");}
    }
    function xpToNextLevel(level){return 100+(level-1)*50;}
    function calculateBattleXpGained(eL,pL){const base=30+eL*5;const diff=eL-pL;let mult=1;if(diff>=3)mult=1.5;else if(diff===2)mult=1.25;else if(diff===1)mult=1.1;else if(diff===-1)mult=0.85;else if(diff===-2)mult=0.7;else if(diff<=-3)mult=0.5;return Math.max(5,Math.round(base*mult));}
    function gainXP(amount){
      if(!gameState.playerPokemonState)return;
      gameState.playerPokemonState.currentXP=(gameState.playerPokemonState.currentXP||0)+amount;
      gameState.xpGainedMessage=t("xpGainMsg").replace("{amount}",String(amount));gameState.xpMessageTimer=2000;
      let leveled=false;
      while(true){const level=gameState.playerPokemonState.level;const needed=100+(level-1)*50;if(gameState.playerPokemonState.currentXP<needed)break;gameState.playerPokemonState.currentXP-=needed;gameState.playerPokemonState.level+=1;const fm=createBattlePokemon(gameState.playerPokemonState.name,gameState.playerPokemonState.level);gameState.playerPokemonState.currentHp=Math.min(gameState.playerPokemonState.currentHp+5,fm.maxHp);leveled=true;}
      if(leveled){const n=displayName(gameState.playerPokemonState.name);const lv=gameState.playerPokemonState.level;gameState.levelUpMessage=t("levelUpLine").replace("{name}",n).replace("{lvl}",String(lv));gameState.levelUpTimer=2500;}
    }
    function finishBattleWin(){
      if(gameState.playerPokemonState&&battleState.enemyMon){const xp=calculateBattleXpGained(battleState.enemyMon.level,gameState.playerPokemonState.level);gainXP(xp);}
      battleState.active=false;gameState.scene=battleState.returnScene;player.x=battleState.returnX;player.y=battleState.returnY;snapPlayerToGrid();
      if(battleState.afterWinText)openDialogue("Rival",battleState.afterWinText);saveGame(false);

    function finishBattleLose(){

    function chooseEnemyMove(mon){const usable=mon.moves.map((m,i)=>({m,i})).filter(x=>x.m.currentPP>0);if(!usable.length)return 0;return usable[Math.floor(Math.random()*usable.length)].i;}
    function processBattleAction(attackerKey,moveIdx){
      const attacker=attackerKey==="player"?battleState.playerMon:battleState.enemyMon;const defender=attackerKey==="player"?battleState.enemyMon:battleState.playerMon;
      const move=attacker.moves[moveIdx];const out=applyMove(attacker,defender,move);battleState.messageText=out.leadText;
      if(attackerKey==="player"){battleState.playerShake=300;battleState.enemyFlash=400;}else{battleState.enemyShake=300;battleState.playerFlash=400;}
      battleState.phase="actionMessage";battleState.timer=900;battleState.pendingTexts=out.texts.slice();
    }
    function stepBattle(dt){
      if(!battleState.active)return;
      updateHpDisplay(battleState.playerMon,dt);updateHpDisplay(battleState.enemyMon,dt);
      battleState.playerShake=Math.max(0,battleState.playerShake-dt);battleState.enemyShake=Math.max(0,battleState.enemyShake-dt);
      battleState.playerFlash=Math.max(0,battleState.playerFlash-dt);battleState.enemyFlash=Math.max(0,battleState.enemyFlash-dt);
      if(["intro","actionMessage","statusMessage","ending","endingLose"].includes(battleState.phase)){battleState.timer-=dt;if(battleState.timer>0)return;}
      if(battleState.phase==="intro"){battleState.phase="select";return;}
      if(battleState.phase==="actionMessage"){
        if(battleState.pendingTexts&&battleState.pendingTexts.length){battleState.messageText=battleState.pendingTexts.shift();battleState.phase="statusMessage";battleState.timer=1100;return;}
        resolveBattleEnd();if(battleState.phase.startsWith("ending"))return;
        if(battleState.turnOwner==="player"){battleState.turnOwner="enemy";processBattleAction("enemy",chooseEnemyMove(battleState.enemyMon));return;}
        const pTick=applyBoundTick(battleState.playerMon),eTick=applyBoundTick(battleState.enemyMon),tickMsg=pTick||eTick;
        resolveBattleEnd();if(battleState.phase.startsWith("ending"))return;
        if(tickMsg){battleState.messageText=tickMsg;battleState.phase="statusMessage";battleState.timer=1000;return;}
        battleState.phase="select";return;
      }
      if(battleState.phase==="statusMessage"){
        if(battleState.pendingTexts&&battleState.pendingTexts.length){battleState.messageText=battleState.pendingTexts.shift();battleState.phase="statusMessage";battleState.timer=1100;return;}
        resolveBattleEnd();if(battleState.phase.startsWith("ending"))return;
        if(battleState.turnOwner==="player"){battleState.turnOwner="enemy";processBattleAction("enemy",chooseEnemyMove(battleState.enemyMon));}
        else{const pT=applyBoundTick(battleState.playerMon),eT=applyBoundTick(battleState.enemyMon),tM=pT||eT;resolveBattleEnd();if(battleState.phase.startsWith("ending"))return;if(tM){battleState.messageText=tM;battleState.timer=1000;battleState.phase="statusMessage";}else battleState.phase="select";}
        return;
      }
      if(battleState.phase==="ending"){finishBattleWin();return;}
      if(battleState.phase==="endingLose"){battleState.phase="blackout";battleState.messageText=t("blackedOut");battleState.timer=1500;return;}
      if(battleState.phase==="blackout"){battleState.timer-=dt;if(battleState.timer<=0)finishBattleLose();}
    }

      drawPokemonSprite(em,710,300,false,battleState.enemyShake,battleState.enemyFlash);
      drawPokemonSprite(pm,260,640,true,battleState.playerShake,battleState.playerFlash);
      ctx.fillStyle="rgba(255,255,255,0.9)";ctx.fillRect(40,40,360,110);ctx.fillRect(560,540,360,130);
      ctx.strokeStyle="#1e293b";ctx.lineWidth=2;ctx.strokeRect(40,40,360,110);ctx.strokeRect(560,540,360,130);
      ctx.fillStyle="#0f172a";ctx.font="24px Arial";ctx.fillText(`${displayName(em.name)} Lv.${em.level}`,58,78);drawHpBar(58,96,320,26,em.displayHp,em.maxHp);
      ctx.fillText(`${displayName(pm.name)} Lv.${pm.level}`,578,578);drawHpBar(578,596,320,26,pm.displayHp,pm.maxHp);
      ctx.font="20px Arial";ctx.fillText(`${Math.max(0,Math.round(pm.hp))}/${pm.maxHp}`,770,650);
      ctx.fillStyle="rgba(0,0,0,0.72)";ctx.fillRect(20,720,920,220);ctx.strokeStyle="rgba(255,255,255,0.7)";ctx.strokeRect(20,720,920,220);
      ctx.fillStyle="#fff";ctx.font="20px Trebuchet MS, Arial";wrapText(battleState.messageText,36,750,540,24);
      if(battleState.phase==="select"){
        const moves=pm.moves;const gridX=580,gridY=740,bw=165,bh=80;
        for(let i=0;i<4;i++){const col=i%2,row=Math.floor(i/2),x=gridX+col*(bw+10),y=gridY+row*(bh+10),sel=i===battleState.moveSelectIndex,move=moves[i],dis=move.currentPP<=0;
          ctx.fillStyle=dis?"#475569":sel?"#1d4ed8":"#334155";ctx.fillRect(x,y,bw,bh);ctx.strokeStyle=sel?"#fde047":"#94a3b8";ctx.lineWidth=2;ctx.strokeRect(x,y,bw,bh);
          ctx.fillStyle="#fff";ctx.font="16px Arial";ctx.fillText(moveDisplayName(move),x+10,y+28);ctx.fillText(`PP ${move.currentPP}/${move.pp}`,x+10,y+52);}
        const m=moves[battleState.moveSelectIndex];ctx.fillStyle="rgba(15,23,42,0.95)";ctx.fillRect(580,905,340,30);ctx.fillStyle="#e2e8f0";ctx.font="14px Arial";ctx.fillText(`${m.type} - ${m.category}: ${moveDesc(m)}`,588,925);
      }
    }

    function drawScene(){
      if(gameState.scene==="battle"){drawBattleScene();return;}
      if(gameState.scene==="village"){
        const worldW=MAP_WIDTH*TILE_SIZE,worldH=MAP_HEIGHT*TILE_SIZE;
        camera.x=Math.max(0,Math.min(player.x+TILE_SIZE/2-canvas.width/2,worldW-canvas.width));
        camera.y=Math.max(0,Math.min(player.y+TILE_SIZE/2-canvas.height/2,worldH-canvas.height));
        drawMap();drawBuildingsLabels();
        const p1={...villageProfessor,x:villageProfessor.x-camera.x,y:villageProfessor.y-camera.y};
        const p2={...rival,x:rival.x-camera.x,y:rival.y-camera.y};
        const pp={...player,x:player.x-camera.x,y:player.y-camera.y};
        Character.prototype.draw.call(p1);Character.prototype.draw.call(p2);Character.prototype.draw.call(pp);
        return;
      }
      if(gameState.scene==="center"){
        const offsetX=Math.floor((MAP_WIDTH-LAB_WIDTH)/2),offsetY=Math.floor((MAP_HEIGHT-LAB_HEIGHT)/2);
        camera.x=tileToPixel(offsetX)-(canvas.width-LAB_WIDTH*TILE_SIZE)/2;
        camera.y=tileToPixel(offsetY)-(canvas.height-LAB_HEIGHT*TILE_SIZE)/2;
        drawMap();drawTileGrid(centerMap,LAB_WIDTH,LAB_HEIGHT,offsetX,offsetY);
        const px=player.x,py=player.y,nx=nurse.x,ny=nurse.y;
        player.x=tileToPixel(offsetX)+player.x;player.y=tileToPixel(offsetY)+player.y;
        nurse.x=tileToPixel(offsetX)+nurse.x;nurse.y=tileToPixel(offsetY)+nurse.y;
        const pp={...player,x:player.x-camera.x,y:player.y-camera.y};
        const nn={...nurse,x:nurse.x-camera.x,y:nurse.y-camera.y};
        Character.prototype.draw.call(nn);Character.prototype.draw.call(pp);
        player.x=px;player.y=py;nurse.x=nx;nurse.y=ny;return;
      }
      // Lab
      const offsetX=Math.floor((MAP_WIDTH-LAB_WIDTH)/2),offsetY=Math.floor((MAP_HEIGHT-LAB_HEIGHT)/2);
      camera.x=tileToPixel(offsetX)-(canvas.width-LAB_WIDTH*TILE_SIZE)/2;
      camera.y=tileToPixel(offsetY)-(canvas.height-LAB_HEIGHT*TILE_SIZE)/2;
      drawMap();drawTileGrid(labMap,LAB_WIDTH,LAB_HEIGHT,offsetX,offsetY);
      const px=player.x,py=player.y,lpx=labProfessor.x,lpy=labProfessor.y;
      player.x=tileToPixel(offsetX)+player.x;player.y=tileToPixel(offsetY)+player.y;
      labProfessor.x=tileToPixel(offsetX)+labProfessor.x;labProfessor.y=tileToPixel(offsetY)+labProfessor.y;
      const pp={...player,x:player.x-camera.x,y:player.y-camera.y};
      const pr={...labProfessor,x:labProfessor.x-camera.x,y:labProfessor.y-camera.y};
      drawLabLabels();drawStarterBalls();Character.prototype.draw.call(pr);Character.prototype.draw.call(pp);
      player.x=px;player.y=py;labProfessor.x=lpx;labProfessor.y=lpy;
    }

    // ── INPUT ─────────────────────────────────────────────────────────────────────
    window.addEventListener("keydown",event=>{
      const key=event.key,normalized=normalizeKey(key);
      if(key==="Tab")event.preventDefault();
      if(keyToDirection(normalized)||isActionKey("confirmTalk",normalized)||isActionKey("cancel",normalized))event.preventDefault();
      if(event.repeat)return;
      if(!spritesReady)return;

      // ESC opens/closes tab menu (replaces old Tab behaviour in-game)
      if(isActionKey("cancel",normalized)){
        if(settingsState.open){setSettingsOpen(false);return;}
        if(gameState.mode==="playing"&&!gameState.dialogueOpen&&!gameState.choiceMenuOpen&&!gameState.nurseChoiceOpen&&gameState.scene!=="battle"){
          setTabOpen(!tabState.open);return;
        }
        // close dialogue with cancel
        if(gameState.dialogueOpen){closeDialogue();return;}
      }

      if(key==="Tab"&&gameState.mode==="playing"&&!settingsState.open){setTabOpen(!tabState.open);return;}

      if(tabState.open){
        if(key==="Tab"){setTabOpen(false);return;}
        if(isActionKey("moveUp",normalized)){tabState.selectedIndex=(tabState.selectedIndex+tabActions.length-1)%tabActions.length;updateTabSelection();return;}
        if(isActionKey("moveDown",normalized)){tabState.selectedIndex=(tabState.selectedIndex+1)%tabActions.length;updateTabSelection();return;}
        if(isActionKey("confirmTalk",normalized)){handleTabAction(tabActions[tabState.selectedIndex]);return;}
        return;
      }
      if(settingsState.open){
        if(settingsState.waitingAction){const ok=tryRebind(settingsState.waitingAction,key);settingsState.waitingAction=null;if(ok)clearWarning();renderBindings();return;}
        return;
      }
      if(gameState.mode!=="playing")return;
      if(gameState.scene==="battle"){
        if(battleState.phase==="select"){
          if(isActionKey("moveLeft",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex%2===1?battleState.moveSelectIndex-1:battleState.moveSelectIndex;
          if(isActionKey("moveRight",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex%2===0?battleState.moveSelectIndex+1:battleState.moveSelectIndex;
          if(isActionKey("moveUp",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex>=2?battleState.moveSelectIndex-2:battleState.moveSelectIndex;
          if(isActionKey("moveDown",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex<=1?battleState.moveSelectIndex+2:battleState.moveSelectIndex;
          if(isActionKey("confirmTalk",normalized)){const mv=battleState.playerMon.moves[battleState.moveSelectIndex];if(mv.currentPP>0){battleState.turnOwner="player";processBattleAction("player",battleState.moveSelectIndex);}}
        }return;
      }
      if(isActionKey("sprint",normalized)){inputState.heldSprint=true;return;}
      const dirKey=keyToDirection(normalized);
      if(dirKey){const idx=inputState.heldDirs.indexOf(dirKey);if(idx!==-1)inputState.heldDirs.splice(idx,1);inputState.heldDirs.push(dirKey);rebuildActiveDirection();}
      if((isActionKey("moveLeft",normalized)||isActionKey("moveUp",normalized))&&(gameState.choiceMenuOpen||gameState.nurseChoiceOpen)){if(gameState.nurseChoiceOpen)gameState.nurseChoiceIndex=0;else gameState.choiceIndex=0;return;}
      if((isActionKey("moveRight",normalized)||isActionKey("moveDown",normalized))&&(gameState.choiceMenuOpen||gameState.nurseChoiceOpen)){if(gameState.nurseChoiceOpen)gameState.nurseChoiceIndex=1;else gameState.choiceIndex=1;return;}
      if(isActionKey("confirmTalk",normalized)&&gameState.nurseChoiceOpen){confirmNurseChoice();return;}
      if(isActionKey("confirmTalk",normalized)){if(gameState.choiceMenuOpen)confirmStarterChoice();else toggleDialogue();return;}
    });
    window.addEventListener("keyup",event=>{
      if(!spritesReady||gameState.mode!=="playing")return;
      const normalized=normalizeKey(event.key);
      if(isActionKey("sprint",normalized)){inputState.heldSprint=false;return;}
      const dirKey=keyToDirection(normalized);if(!dirKey)return;
      inputState.heldDirs=inputState.heldDirs.filter(d=>d!==dirKey);rebuildActiveDirection();
      if(!inputState.activeDir)snapPlayerToGrid();
    });

    function render(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if(!spritesReady){ctx.fillStyle="#0f172a";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#e2e8f0";ctx.font="28px Arial";ctx.fillText(t("loadingSprites"),320,470);return;}
      drawScene();
      if(gameState.scene!=="battle"){
        drawPartnerHud();drawDialogueBox();drawXpFloatingMessages();
        if(gameState.darkGrassHintTimer>0&&gameState.scene==="village"){
          const p=worldToScreen(player.x,player.y);
          ctx.fillStyle="rgba(0,0,0,0.72)";ctx.fillRect(p.x-120,p.y-34,240,26);
          ctx.fillStyle="#d9f99d";ctx.font="12px Arial";ctx.fillText(t("darkGrassWarning"),p.x-108,p.y-16);
        }
      }
    }

    setInterval(()=>{if(!spritesReady||gameState.mode!=="playing"||settingsState.open||tabState.open)return;gameState.playTime+=1;},1000);
    setInterval(()=>{if(!spritesReady||gameState.mode!=="playing")return;saveGame(false);},60000);

    let lastTs=performance.now();
    function gameLoop(ts){
      const dt=ts-lastTs;lastTs=ts;animTime+=dt/1000;
      if(!settingsState.open&&!tabState.open&&spritesReady&&gameState.mode==="playing"){
        updatePlayerMovement(dt);updateHealingSequence(dt);
        if(gameState.darkGrassHintTimer>0)gameState.darkGrassHintTimer=Math.max(0,gameState.darkGrassHintTimer-dt);
        if(gameState.xpMessageTimer>0)gameState.xpMessageTimer=Math.max(0,gameState.xpMessageTimer-dt);
        if(gameState.levelUpTimer>0)gameState.levelUpTimer=Math.max(0,gameState.levelUpTimer-dt);
        stepBattle(dt);
      }
      render();requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
