<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Village RPG</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");
    :root { --bg: #0f172a; --panel: rgba(10,10,20,0.82); --text: #f8fafc; }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; overflow: hidden;
      display: grid; place-items: center;
      background: radial-gradient(circle at 20% 20%, #1e293b, var(--bg) 65%);
      font-family: "Trebuchet MS", Arial, sans-serif; color: var(--text);
    }
    .game-wrap {
      position: relative; width: 960px; max-width: 96vw;
      max-height: 96vh; aspect-ratio: 1/1;
      border: 3px solid #334155; border-radius: 10px;
      overflow: visible; isolation: isolate;
      box-shadow: 0 15px 40px rgba(0,0,0,0.45);
    }
    canvas {
      position: relative; z-index: 1; display: block;
      width: 100%; height: 100%; image-rendering: pixelated;
      background: #111827; pointer-events: none; border-radius: 8px;
    }
    .settings-btn {
      position: absolute; top: 10px; right: 10px; z-index: 20;
      width: 40px; height: 40px; border: 1px solid #94a3b8; border-radius: 8px;
      background: rgba(15,23,42,0.86); color: #e2e8f0; font-size: 20px; cursor: pointer;
    }
    .settings-backdrop {
      position: absolute; inset: 0; display: none; z-index: 300;
      background: rgba(2,6,23,0.72); align-items: center; justify-content: center;
    }
    .settings-backdrop.open { display: flex; }
    .settings-panel {
      width: min(90%,700px); max-height: 86%; overflow: auto;
      background: rgba(15,23,42,0.96); border: 2px solid #334155;
      border-radius: 12px; padding: 20px; color: #f8fafc;
      font-family: "Press Start 2P", monospace; font-size: 11px; line-height: 1.6;
    }
    .settings-title { margin: 0 0 10px; font-size: 16px; }
    .settings-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; margin: 8px 0; }
    .kbd-chip { min-width: 150px; padding: 6px 8px; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: #cbd5e1; text-align: center; font-size: 10px; }
    .settings-panel button { border: 1px solid #64748b; border-radius: 6px; background: #1e293b; color: #f8fafc; padding: 8px 10px; font-family: inherit; font-size: 10px; cursor: pointer; }
    .warning-text { color: #fca5a5; min-height: 14px; margin-top: 8px; font-size: 10px; }
    .settings-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 14px; }
    .overlay-screen { position: absolute; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; font-family: "Press Start 2P", monospace; pointer-events: none; }
    .overlay-screen.open { display: flex; pointer-events: auto; }
    .overlay-screen.open button, .overlay-screen.open input { pointer-events: auto; position: relative; z-index: 10; }
    .landing-bg { width: 100%; height: 100%; background: radial-gradient(circle at 30% 20%, #1e3a8a, #020617 70%), repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 8px, transparent 8px, transparent 18px); position: absolute; inset: 0; pointer-events: none; }
    .landing-content { position: relative; z-index: 2; pointer-events: auto; text-align: center; width: min(92%,760px); color: #f8fafc; text-shadow: 2px 2px 0 #020617; }
    .landing-title { font-size: 20px; line-height: 1.6; margin-bottom: 28px; }
    .landing-sprites { display: flex; justify-content: center; gap: 28px; margin-bottom: 28px; }
    .landing-sprites img { width: 80px; height: 80px; image-rendering: pixelated; animation: bob 0.7s steps(2) infinite alternate; background: rgba(15,23,42,0.45); border-radius: 8px; padding: 6px; }
    @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-8px); } }
    .menu-btn { font-family: "Press Start 2P", monospace; font-size: 11px; color: #f8fafc; background: #1e293b; border: 2px solid #facc15; border-radius: 8px; padding: 12px 14px; cursor: pointer; margin: 8px; min-width: 280px; }
    .lang-toggle { position: absolute; top: 14px; right: 14px; z-index: 3; pointer-events: auto; }
    .dialog-card { position: relative; z-index: 2; width: min(92%,620px); background: rgba(15,23,42,0.95); border: 2px solid #334155; border-radius: 12px; padding: 20px; color: #f8fafc; text-align: center; font-family: "Press Start 2P", monospace; font-size: 11px; line-height: 1.7; }
    .dialog-input { width: 100%; margin: 14px 0; background: #0f172a; border: 2px solid #475569; border-radius: 8px; color: #f8fafc; padding: 10px; font-family: inherit; text-align: center; }
    /* TAB MENU — hidden by default, shown on ESC */
    .tab-menu {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%) translateX(100%);
      width: 320px;
      max-height: 90vh;
      z-index: 9999;
      background: rgba(2, 6, 23, 0.97);
      border: 2px solid #facc15;
      border-right: none;
      border-radius: 12px 0 0 12px;
      transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.22s ease, visibility 0.22s;
      font-family: "Press Start 2P", monospace;
      color: #f8fafc;
      padding: 14px;
      overflow-y: auto;
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.6);
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }
    .tab-menu.open {
      transform: translateY(-50%) translateX(0%);
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }
    .tab-btn { width: 100%; margin: 6px 0; text-align: left; font-family: inherit; font-size: 10px; background: #1e293b; border: 1px solid #475569; color: #f8fafc; padding: 10px; border-radius: 8px; cursor: pointer; }
    .tab-subpanel { margin-top: 12px; background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 9px; line-height: 1.6; max-height: 45vh; overflow: auto; }
    /* ESC hint shown in game */
    .esc-hint { position: absolute; bottom: 8px; right: 8px; z-index: 15; font-family: "Press Start 2P", monospace; font-size: 7px; color: rgba(255,255,255,0.4); pointer-events: none; display: none; }
    .esc-hint.visible { display: block; }
  </style>
</head>

    if (!CanvasRenderingContext2D.prototype.roundRect) {

        r = Math.min(r, w/2, h/2);
        this.beginPath();
        this.moveTo(x+r,y);
        this.arcTo(x+w,y,x+w,y+h,r);
        this.arcTo(x+w,y+h,x,y+h,r);
        this.arcTo(x,y+h,x,y,r);
        this.arcTo(x,y,x+w,y,r);
        this.closePath();
      };

    // ── 2.5D TILE RENDERING ──────────────────────────────────────────────────────
    function drawTileGrid(grid,width,height,offsetX=0,offsetY=0){
      for(let y=0;y<height;y++){
        for(let x=0;x<width;x++){
          const tileType=grid[y][x];
          const px=(x+offsetX)*TILE_SIZE, py=(y+offsetY)*TILE_SIZE;
          const sx=px-camera.x, sy=py-camera.y;
          if(sx+TILE_SIZE<0||sy+TILE_SIZE<0||sx>canvas.width||sy>canvas.height)continue;

          // ── GRASS ──
          if(tileType===Tile.GRASS){
            ctx.fillStyle=tileColors[Tile.GRASS];
            ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // subtle variation using position as deterministic seed
            const v=((x*7+y*13)%5)*0.013;
            if(v>0.02){ctx.fillStyle=`rgba(0,0,0,${v})`;ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);}
            // grass texture lines
            ctx.strokeStyle="rgba(0,0,0,0.06)";ctx.lineWidth=1;
            for(let i=0;i<3;i++){const ox=(x*17+y*11+i*7)%TILE_SIZE;ctx.beginPath();ctx.moveTo(sx+ox,sy+TILE_SIZE*0.3);ctx.lineTo(sx+ox,sy+TILE_SIZE*0.7);ctx.stroke();}
          }
          // ── DARK GRASS ──
          else if(tileType===Tile.DARK_GRASS){
            ctx.fillStyle=tileColors[Tile.DARK_GRASS];
            ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // extra darkening towards edges (subtle vignette per tile)
            const grd=ctx.createRadialGradient(sx+TILE_SIZE/2,sy+TILE_SIZE/2,4,sx+TILE_SIZE/2,sy+TILE_SIZE/2,TILE_SIZE*0.8);
            grd.addColorStop(0,"rgba(0,0,0,0)");grd.addColorStop(1,"rgba(0,0,0,0.2)");
            ctx.fillStyle=grd;ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // triangular grass blades
            const blades=[{bx:sx+10,by:sy+TILE_SIZE-8},{bx:sx+22,by:sy+TILE_SIZE-6},{bx:sx+36,by:sy+TILE_SIZE-10},{bx:sx+48,by:sy+TILE_SIZE-6},{bx:sx+56,by:sy+TILE_SIZE-8}];
            blades.forEach(({bx,by})=>{
              ctx.fillStyle="#1a4d0f";ctx.beginPath();ctx.moveTo(bx-3,by);ctx.lineTo(bx,by-14);ctx.lineTo(bx+3,by);ctx.closePath();ctx.fill();
              ctx.fillStyle="#2d6e1a";ctx.beginPath();ctx.moveTo(bx-1,by);ctx.lineTo(bx,by-10);ctx.lineTo(bx+1,by);ctx.closePath();ctx.fill();
            });
          }
          // ── WATER ──
          else if(tileType===Tile.WATER){
            ctx.fillStyle="#1e56c0";ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            const wg=ctx.createLinearGradient(sx,sy,sx+TILE_SIZE,sy+TILE_SIZE);
            wg.addColorStop(0,"rgba(100,160,255,0.35)");wg.addColorStop(1,"rgba(10,50,150,0.35)");
            ctx.fillStyle=wg;ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // shimmer
            const so=(animTime*0.6+x*0.4+y*0.3)%1;
            ctx.fillStyle="rgba(255,255,255,0.13)";ctx.fillRect(sx,sy+so*TILE_SIZE,TILE_SIZE,4);
            ctx.fillStyle="rgba(255,255,255,0.07)";ctx.fillRect(sx,sy+((so+0.5)%1)*TILE_SIZE,TILE_SIZE,2);
            ctx.fillStyle="rgba(0,0,40,0.18)";ctx.fillRect(sx,sy,TILE_SIZE,4);ctx.fillRect(sx,sy+TILE_SIZE-4,TILE_SIZE,4);
          }
          // ── PATH ──
          else if(tileType===Tile.PATH){
            ctx.fillStyle=tileColors[Tile.PATH];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // recessed inner edge
            ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=3;ctx.strokeRect(sx+1.5,sy+1.5,TILE_SIZE-3,TILE_SIZE-3);
            // dirt texture dots
            ctx.fillStyle="rgba(0,0,0,0.07)";
            for(let i=0;i<4;i++){const dx=(x*23+y*17+i*11)%50+4;const dy=(x*19+y*29+i*7)%50+4;ctx.beginPath();ctx.arc(sx+dx,sy+dy,1.5,0,Math.PI*2);ctx.fill();}
          }
          // ── WALL / BUILDINGS ──
          else if(tileType===Tile.WALL||tileType===Tile.CENTER_ROOF||tileType===Tile.CENTER_WALL){
            // base color
            ctx.fillStyle=tileColors[tileType];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            // lit top edge
            ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(sx,sy,TILE_SIZE,10);
            // shadow bottom edge (fake 3D floor)
            ctx.fillStyle="rgba(0,0,0,0.35)";ctx.fillRect(sx,sy+TILE_SIZE-12,TILE_SIZE,12);
            // left-side light strip
            ctx.fillStyle="rgba(255,255,255,0.10)";ctx.fillRect(sx,sy,8,TILE_SIZE);
            // right-side shadow strip
            ctx.fillStyle="rgba(0,0,0,0.20)";ctx.fillRect(sx+TILE_SIZE-8,sy,8,TILE_SIZE);
            // brick/panel lines for walls
            if(tileType===Tile.WALL||tileType===Tile.CENTER_WALL){
              ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1;
              ctx.beginPath();ctx.moveTo(sx,sy+TILE_SIZE/2);ctx.lineTo(sx+TILE_SIZE,sy+TILE_SIZE/2);ctx.stroke();
              ctx.beginPath();ctx.moveTo(sx+TILE_SIZE/2,sy);ctx.lineTo(sx+TILE_SIZE/2,sy+TILE_SIZE);ctx.stroke();
            }
          }
          // ── LAB FLOOR ──
          else if(tileType===Tile.LAB_FLOOR){
            ctx.fillStyle=tileColors[Tile.LAB_FLOOR];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1;ctx.strokeRect(sx+4,sy+4,TILE_SIZE-8,TILE_SIZE-8);
          }
          else if(tileType===Tile.GYM_FLOOR_GREEN||tileType===Tile.GYM_FLOOR_PURPLE){
            ctx.fillStyle=tileColors[tileType];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            ctx.strokeStyle="rgba(0,0,0,0.15)";ctx.lineWidth=1;ctx.strokeRect(sx+4,sy+4,TILE_SIZE-8,TILE_SIZE-8);
          }
          // ── CENTER FLOORS ──
          else if(tileType===Tile.CENTER_FLOOR_A||tileType===Tile.CENTER_FLOOR_B){
            ctx.fillStyle=tileColors[tileType];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            ctx.strokeStyle="rgba(200,100,150,0.15)";ctx.lineWidth=1;ctx.strokeRect(sx+3,sy+3,TILE_SIZE-6,TILE_SIZE-6);
          }
          // ── DESK ──
          else if(tileType===Tile.CENTER_DESK){
            ctx.fillStyle=tileColors[Tile.CENTER_DESK];ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
            ctx.fillStyle="rgba(255,255,255,0.12)";ctx.fillRect(sx,sy,TILE_SIZE,8);
            ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(sx,sy+TILE_SIZE-10,TILE_SIZE,10);
          }
          else{ctx.fillStyle=tileColors[tileType]||"#333";ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);}

          // grid line (subtle)
          ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=1;ctx.strokeRect(sx,sy,TILE_SIZE,TILE_SIZE);
        }
      }
    }

    function getTrainerSightTiles(trainer){
      const dv=dirToVec[trainer.sightDir];const tiles=[];
      for(let i=1;i<=trainer.sightRange;i++)tiles.push({x:trainer.x+dv.dx*i,y:trainer.y+dv.dy*i});
      return tiles;
    }
    function checkZoneTransition(){
      if(gameState.scene!=="village"||gameState.zoneTransitioning)return;
      const p=getTilePos(player);const transitions=ZONES[gameState.currentZone].transitions||[];
      const tr=transitions.find(t=>t.tileX===p.x&&t.tileY===p.y);if(!tr)return;
      startZoneTransition(tr);
    }
    function startZoneTransition(tr){
      gameState.zoneTransitioning=true;gameState.zoneTransitionAlpha=0;
      const fadeOut=setInterval(()=>{

        if(gameState.zoneTransitionAlpha>=1){
          clearInterval(fadeOut);
          gameState.currentZone=tr.targetZone;setEntityTile(player,tr.spawnX,tr.spawnY);syncMovementTileFromPlayer();
          gameState.zoneNameText=LANG==="fr"?ZONES[tr.targetZone].nameFr:ZONES[tr.targetZone].name;gameState.zoneNameTimer=2200;
          saveGame(false);
          const fadeIn=setInterval(()=>{
            gameState.zoneTransitionAlpha-=0.08;
            if(gameState.zoneTransitionAlpha<=0){gameState.zoneTransitionAlpha=0;gameState.zoneTransitioning=false;clearInterval(fadeIn);}
          },16);
        }
      },16);
    }
    function checkTrainerSight(){
      if(gameState.mode!=="playing"||gameState.dialogueOpen||gameState.choiceMenuOpen||gameState.zoneTransitioning||tabState.open||settingsState.open)return;
      if(gameState.activeTrainerChallenge)return;
      const p=getTilePos(player);
      const tryList=(npcs)=>{
        for(const npc of npcs){
          if(npc.type!=="trainer")continue;
          if(gameState.defeatedTrainers.includes(npc.id))continue;
          const sight=getTrainerSightTiles(npc);
          if(sight.some(tile=>tile.x===p.x&&tile.y===p.y)){
            gameState.activeTrainerChallenge=npc.id;gameState.trainerExclamationTimer=800;
            const idCopy=npc.id;setTimeout(()=>{
              if(gameState.activeTrainerChallenge===idCopy&&!gameState.dialogueOpen)openDialogue(npc.name,npc.preText,"startTrainerBattle_"+npc.id);
            },800);
            return true;
          }
        }
        return false;
      };
      if(gameState.scene==="village"){tryList(ZONES[gameState.currentZone].npcs||[]);return;}
      if(gameState.scene==="gym2"){tryList(GYM2_NPCS);return;}
      if(gameState.scene==="gym4")tryList(GYM4_NPCS);
    }
    function drawGymNpcs(npcs,offsetX,offsetY){

        }
      }

    // ── BUILDING ROOFTOP 2.5D ────────────────────────────────────────────────────
    function drawBuildingRoof(tx,ty,tw,color){
      const s=worldToScreen(tileToPixel(tx),tileToPixel(ty));
      const w=tw*TILE_SIZE, roofH=TILE_SIZE*0.55;
      ctx.fillStyle=color;
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+w*0.5,s.y-roofH);ctx.lineTo(s.x+w,s.y);ctx.closePath();ctx.fill();
      // shadow right slope
      ctx.fillStyle="rgba(0,0,0,0.22)";
      ctx.beginPath();ctx.moveTo(s.x+w*0.5,s.y-roofH);ctx.lineTo(s.x+w,s.y);ctx.lineTo(s.x+w,s.y-4);ctx.closePath();ctx.fill();
      // highlight left slope
      ctx.fillStyle="rgba(255,255,255,0.14)";
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+w*0.5,s.y-roofH);ctx.lineTo(s.x+w*0.5+2,s.y-roofH+4);ctx.lineTo(s.x+6,s.y);ctx.closePath();ctx.fill();
      // chimney
      const cx=s.x+w*0.3;
      ctx.fillStyle=darken(color,30);ctx.fillRect(cx,s.y-roofH*0.5-14,12,14);
      ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(cx,s.y-roofH*0.5-14,12,4);
    }

    function drawBuildingsLabels(){

      const xpG=ctx.createLinearGradient(72,0,72+300*ratio,0);xpG.addColorStop(0,"#6366f1");xpG.addColorStop(1,"#a5b4fc");
      ctx.fillStyle=xpG;ctx.beginPath();ctx.roundRect(72,58,300*ratio,9,4);ctx.fill();

    // ── INPUT ─────────────────────────────────────────────────────────────────────
    window.addEventListener("keydown",event=>{
      const key=event.key,normalized=normalizeKey(key);
      if(key==="Tab")event.preventDefault();
      if(keyToDirection(normalized)||isActionKey("confirmTalk",normalized)||isActionKey("cancel",normalized))event.preventDefault();
      if(event.repeat)return;
      if(!spritesReady)return;

      const minimapEl=document.getElementById("minimapOverlay");
      if(minimapEl&&minimapEl.style.display==="flex"){
        if(isActionKey("cancel",normalized)){minimapEl.style.display="none";return;}
        return;
      }

      // ESC opens/closes tab menu (replaces old Tab behaviour in-game)
      if(isActionKey("cancel",normalized)){
        if(settingsState.open){setSettingsOpen(false);return;}
        if(gameState.scene==="battle"&&battleState.active&&battleState.phase==="select"&&(battleState.battleMenuLevel==="moves"||battleState.battleMenuLevel==="items"||battleState.battleMenuLevel==="pokemon")){
          battleState.battleMenuLevel="action";
          return;
        }
        if(gameState.mode==="playing"&&!gameState.dialogueOpen&&!gameState.choiceMenuOpen&&!gameState.nurseChoiceOpen&&gameState.scene!=="battle"){
          setTabOpen(!tabState.open);return;
        }
        // close dialogue with cancel
        if(gameState.dialogueOpen){closeDialogue();return;}
      }

      if(key==="Tab"&&gameState.mode==="playing"&&!settingsState.open){setTabOpen(!tabState.open);return;}

      if(tabState.open){
        if(key==="Tab"){setTabOpen(false);return;}
        if(isActionKey("moveUp",normalized)){tabState.selectedIndex=(tabState.selectedIndex+tabActions.length-1)%tabActions.length;updateTabSelection();return;}
        if(isActionKey("moveDown",normalized)){tabState.selectedIndex=(tabState.selectedIndex+1)%tabActions.length;updateTabSelection();return;}
        if(isActionKey("confirmTalk",normalized)){handleTabAction(tabActions[tabState.selectedIndex]);return;}
        return;
      }
      if(settingsState.open){
        if(settingsState.waitingAction){const ok=tryRebind(settingsState.waitingAction,key);settingsState.waitingAction=null;if(ok)clearWarning();renderBindings();return;}
        return;
      }
      if(gameState.mode!=="playing")return;
      if(gameState.scene==="battle"){
        if(battleState.phase==="select"){
          if(battleState.battleMenuLevel==="action"){
            if(isActionKey("moveLeft",normalized))battleState.actionMenuIndex=battleState.actionMenuIndex%2===1?battleState.actionMenuIndex-1:battleState.actionMenuIndex;
            if(isActionKey("moveRight",normalized))battleState.actionMenuIndex=battleState.actionMenuIndex%2===0?battleState.actionMenuIndex+1:battleState.actionMenuIndex;
            if(isActionKey("moveUp",normalized))battleState.actionMenuIndex=battleState.actionMenuIndex>=2?battleState.actionMenuIndex-2:battleState.actionMenuIndex;
            if(isActionKey("moveDown",normalized))battleState.actionMenuIndex=battleState.actionMenuIndex<=1?battleState.actionMenuIndex+2:battleState.actionMenuIndex;
            if(isActionKey("confirmTalk",normalized)){
              const keys=["attack","items","pokemon","run"];
              const chosen=keys[battleState.actionMenuIndex];
              if(chosen==="attack")battleState.battleMenuLevel="moves";
              else if(chosen==="items"){
                battleState.battleMenuLevel="items";
                battleState.itemMenuIndex=0;
              }else if(chosen==="pokemon"){
                if(!(gameState.caughtPokemon||[]).length){
                  battleState.messageText=t("singlePokemonMsg");
                  battleState.phase="actionMessage";
                  battleState.timer=1200;
                  battleState.battleMenuLevel="action";
                }else{
                  battleState.battleMenuLevel="pokemon";
                  battleState.pokemonMenuIndex=0;
                }
              }else if(chosen==="run")attemptFlee();
            }
            return;
          }
          if(battleState.battleMenuLevel==="moves"){
            if(isActionKey("cancel",normalized)){battleState.battleMenuLevel="action";return;}
            if(isActionKey("moveLeft",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex%2===1?battleState.moveSelectIndex-1:battleState.moveSelectIndex;
            if(isActionKey("moveRight",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex%2===0?battleState.moveSelectIndex+1:battleState.moveSelectIndex;
            if(isActionKey("moveUp",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex>=2?battleState.moveSelectIndex-2:battleState.moveSelectIndex;
            if(isActionKey("moveDown",normalized))battleState.moveSelectIndex=battleState.moveSelectIndex<=1?battleState.moveSelectIndex+2:battleState.moveSelectIndex;
            if(isActionKey("confirmTalk",normalized)){const mv=battleState.playerMon.moves[battleState.moveSelectIndex];if(mv.currentPP>0){battleState.turnOwner="player";processBattleAction("player",battleState.moveSelectIndex);}}
            return;
          }
          if(battleState.battleMenuLevel==="items"){
            if(isActionKey("cancel",normalized)){battleState.battleMenuLevel="action";return;}
            handleBattleItemInput(normalized);
            return;
          }
          if(battleState.battleMenuLevel==="pokemon"){
            if(isActionKey("cancel",normalized)){battleState.battleMenuLevel="action";return;}
            const party=[gameState.playerPokemonState,...(gameState.caughtPokemon||[])].filter(Boolean);
            if(isActionKey("moveUp",normalized))battleState.pokemonMenuIndex=Math.max(0,(battleState.pokemonMenuIndex||0)-1);
            if(isActionKey("moveDown",normalized))battleState.pokemonMenuIndex=Math.min(party.length-1,(battleState.pokemonMenuIndex||0)+1);
            if(isActionKey("confirmTalk",normalized)){
              const idx=battleState.pokemonMenuIndex||0;
              if(idx===0){battleState.battleMenuLevel="action";return;}
              const chosen=party[idx];
              if(!chosen||chosen.currentHp<=0){
                battleState.messageText=t("pokemonFainted");
                battleState.phase="actionMessage";
                battleState.timer=1000;
                battleState.battleMenuLevel="action";
                return;
              }
              const bm=battleState.playerMon;
              const old={
                name:gameState.playerPokemonState.name,
                type:gameState.playerPokemonState.type,
                level:gameState.playerPokemonState.level,
                currentHp:Math.max(0,Math.round(bm.hp)),
                maxHp:gameState.playerPokemonState.maxHp||bm.maxHp,
                currentXP:gameState.playerPokemonState.currentXP||0,
                moves:bm.moves?bm.moves.map(m=>({...m})):undefined
              };
              gameState.playerPokemonState={
                name:chosen.name,
                type:chosen.type||pokemonDex[chosen.name]?.type||"Normal",
                level:chosen.level,
                currentHp:chosen.currentHp,
                maxHp:chosen.maxHp||createBattlePokemon(chosen.name,chosen.level).maxHp,
                currentXP:chosen.currentXP||0,
                moves:chosen.moves?chosen.moves.map(m=>({...m})):undefined
              };
              gameState.caughtPokemon[idx-1]=old;
              syncBattlePlayerMonFromState();
              battleState.battleMenuLevel="action";
              battleState.messageText=t("goPokemon").replace("{name}",displayName(chosen.name));
              battleState.phase="actionMessage";
              battleState.timer=1000;
              battleState.pendingEnemyTurn=true;
            }
            return;
          }
        }return;
      }
      if(isActionKey("sprint",normalized)){inputState.heldSprint=true;return;}
      const dirKey=keyToDirection(normalized);
      if(dirKey){const idx=inputState.heldDirs.indexOf(dirKey);if(idx!==-1)inputState.heldDirs.splice(idx,1);inputState.heldDirs.push(dirKey);rebuildActiveDirection();}
      if((isActionKey("moveLeft",normalized)||isActionKey("moveUp",normalized))&&(gameState.choiceMenuOpen||gameState.nurseChoiceOpen)){if(gameState.nurseChoiceOpen)gameState.nurseChoiceIndex=0;else gameState.choiceIndex=0;return;}
      if((isActionKey("moveRight",normalized)||isActionKey("moveDown",normalized))&&(gameState.choiceMenuOpen||gameState.nurseChoiceOpen)){if(gameState.nurseChoiceOpen)gameState.nurseChoiceIndex=1;else gameState.choiceIndex=1;return;}
      if(isActionKey("confirmTalk",normalized)&&gameState.nurseChoiceOpen){confirmNurseChoice();return;}
      if(isActionKey("confirmTalk",normalized)){if(gameState.choiceMenuOpen)confirmStarterChoice();else toggleDialogue();return;}
    });
    window.addEventListener("keyup",event=>{
      if(!spritesReady||gameState.mode!=="playing")return;
      const normalized=normalizeKey(event.key);
      if(isActionKey("sprint",normalized)){inputState.heldSprint=false;return;}
      const dirKey=keyToDirection(normalized);if(!dirKey)return;
      inputState.heldDirs=inputState.heldDirs.filter(d=>d!==dirKey);rebuildActiveDirection();
      if(!inputState.activeDir)snapPlayerToGrid();
    });

    function render(){

      drawScene();
      if(gameState.scene!=="battle"){
        drawPartnerHud();drawDialogueBox();drawXpFloatingMessages();
        if(gameState.darkGrassHintTimer>0&&gameState.scene==="village"){
          const p=worldToScreen(player.x,player.y);
          ctx.fillStyle="rgba(0,0,0,0.72)";ctx.fillRect(p.x-120,p.y-34,240,26);
          ctx.fillStyle="#d9f99d";ctx.font="12px Arial";ctx.fillText(t("darkGrassWarning"),p.x-108,p.y-16);
        }
        if(gameState.zoneNameTimer>0){
          const alpha=gameState.zoneNameTimer<500?gameState.zoneNameTimer/500:1;
          ctx.save();ctx.globalAlpha=alpha;ctx.font="bold 28px Arial";
          const tw=ctx.measureText(gameState.zoneNameText).width;
          ctx.fillStyle="rgba(0,0,0,0.75)";ctx.beginPath();ctx.roundRect(canvas.width/2-tw/2-16,canvas.height/2-26,tw+32,46,8);ctx.fill();
          ctx.fillStyle="#facc15";ctx.fillText(gameState.zoneNameText,canvas.width/2-tw/2,canvas.height/2+8);ctx.restore();
        }
      }
      if(gameState.zoneTransitionAlpha>0){
        ctx.save();ctx.globalAlpha=gameState.zoneTransitionAlpha;ctx.fillStyle="#000";
        ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();
      }
    }

    setInterval(()=>{if(!spritesReady||gameState.mode!=="playing"||settingsState.open||tabState.open)return;gameState.playTime+=1;},1000);
    setInterval(()=>{if(!spritesReady||gameState.mode!=="playing")return;saveGame(false);},60000);

    let lastTs=performance.now();
    function gameLoop(ts){
      const dt=ts-lastTs;lastTs=ts;animTime+=dt/1000;
      if(!settingsState.open&&!tabState.open&&spritesReady&&gameState.mode==="playing"){
        updatePlayerMovement(dt);updateHealingSequence(dt);checkTrainerSight();
        if(gameState.zoneNameTimer>0)gameState.zoneNameTimer=Math.max(0,gameState.zoneNameTimer-dt);
        if(gameState.trainerExclamationTimer>0)gameState.trainerExclamationTimer=Math.max(0,gameState.trainerExclamationTimer-dt);
        if(gameState.darkGrassHintTimer>0)gameState.darkGrassHintTimer=Math.max(0,gameState.darkGrassHintTimer-dt);
        if(gameState.xpMessageTimer>0)gameState.xpMessageTimer=Math.max(0,gameState.xpMessageTimer-dt);
        if(gameState.levelUpTimer>0)gameState.levelUpTimer=Math.max(0,gameState.levelUpTimer-dt);
        stepBattle(dt);
      }
      render();requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
